<!doctype html>
<html lang="mn">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Гуанчжоу — аяллын маршрут | eSIM Mongolia</title>
  <link rel="stylesheet" href="/common.css">
  <link rel="stylesheet" href="/route-detail.css">
</head>
<body>
  <div class="wrap">
    <a href="/china-route.html" class="btn">← Хятад хотууд</a>
    <header class="route-hero">
      <h1>🗼 Гуанчжоу (广州) — 1–2 хоног</h1>
      <p class="lead">Dim sum, Canton Tower, Chimelong Safari. Шэньжэнь 30 мин.</p>
      <div class="route-actions">
        <a class="btn" href="/shanghai-route.html">← Шанхай</a>
        <a class="btn" href="/shenzhen-route.html">Шэньжэнь →</a>
        <a class="btn primary" href="/china.html">📶 China eSIM</a>
      </div>
    </header>
    <div class="poi-grid">
      <article class="poi">
        <img src="/images/routes/china/canton-tower.jpg" alt="Canton Tower" loading="lazy">
        <div class="poi-body"><h3>Canton Tower</h3><table class="poi-price"><tr><td>150–298 CNY</td></tr></table>
        <div class="poi-meta"><a href="https://www.google.com/maps/search/?api=1&query=Canton+Tower" target="_blank" rel="noopener">📍 Maps</a></div></div>
      </article>
      <article class="poi">
        <img src="/images/routes/china/chen-clan.jpg" alt="Chen Clan" loading="lazy">
        <div class="poi-body"><span class="poi-type museum">Музей</span><h3>Chen Clan Academy</h3><table class="poi-price"><tr><td>10 CNY</td></tr></table></div>
      </article>
      <article class="poi">
        <img src="/images/routes/china/chimelong.jpg" alt="Chimelong" loading="lazy">
        <div class="poi-body"><span class="poi-type zoo">Safari</span><h3>Chimelong Safari Park</h3><table class="poi-price"><tr><td>~350 CNY</td></tr></table></div>
      </article>
    </div>
    <div class="transport-grid">
      <div class="transport-card"><h4>Гуанчжоу → Шэньжэнь</h4><p class="price">30 мин • 75 CNY</p></div>
    </div>
  </div>
</body>
</html>
