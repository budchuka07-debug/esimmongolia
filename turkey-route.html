<!doctype html>
<html lang="mn">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Турк — 6 хоногийн маршрут | eSIM Mongolia</title>
  <link rel="stylesheet" href="/common.css">
  <link rel="stylesheet" href="/route-detail.css">
</head>
<body>
  <div class="wrap">
    <a href="/marshrut.html" class="btn">← Маршрут</a>
    <header class="route-hero">
      <h1>🇹🇷 Турк — 6 хоног</h1>
      <p class="lead">Istanbul → Cappadocia → Antalya</p>
      <a class="btn primary" href="/?plan=TR">📶 Turkey eSIM</a>
    </header>
    <div class="video-section">
      <h3>🎬 Istanbul аялал</h3>
      <div class="video-embed"><iframe src="https://www.youtube.com/embed/7Yu_ytJ3gGk" title="Istanbul" allowfullscreen loading="lazy"></iframe></div>
    </div>
    <div class="poi-grid">
      <article class="poi">
        <img src="/images/routes/turkey/istanbul.jpg" alt="Istanbul" loading="lazy">
        <div class="poi-body"><h3>Hagia Sophia &amp; Blue Mosque</h3><table class="poi-price"><tr><td>Hagia Sophia</td><td>~25 EUR</td></tr></table>
        <div class="poi-meta"><a href="https://www.google.com/maps/search/?api=1&query=Hagia+Sophia" target="_blank" rel="noopener">📍 Maps</a></div></div>
      </article>
      <article class="poi">
        <img src="/images/routes/turkey/cappadocia.jpg" alt="Cappadocia" loading="lazy">
        <div class="poi-body"><h3>Cappadocia Hot Air Balloon</h3><table class="poi-price"><tr><td>Balloon</td><td>€150–250</td></tr></table></div>
      </article>
      <article class="poi">
        <img src="/images/routes/turkey/antalya.jpg" alt="Antalya" loading="lazy">
        <div class="poi-body"><h3>Antalya пүү</h3><table class="poi-price"><tr><td>Үнэгүй</td></tr></table></div>
      </article>
    </div>
  </div>
</body>
</html>
