
<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Дугаар | eSIM Mongolia</title>

<style>
body{
font-family:Arial;
background:#f5f6f8;
margin:0;
padding:0;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.box{
background:white;
padding:20px;
border-radius:12px;
margin-top:18px;
box-shadow:0 5px 15px rgba(0,0,0,0.06);
}

h1{
color:#ff7a00;
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:1px solid #ddd;
}

button{
background:#ff7a00;
color:white;
border:none;
padding:12px 18px;
border-radius:8px;
margin-top:14px;
font-weight:bold;
cursor:pointer;
}

#qrbox img{
max-width:240px;
margin-top:15px;
}
</style>
</head>

<body>

<div class="container">

<div class="box">
<h1>🌍 Global Дугаар</h1>
<p>Интернеттэй үед ажиллах USA виртуал дугаар.</p>
</div>

<div class="box">

<h3>Захиалгын мэдээлэл</h3>

<input id="customerName" placeholder="Нэр">
<input id="phone" placeholder="Утас">

<select id="deliveryChannel" onchange="toggleDeliveryFields()">
<option value="">QR код хүлээж авах сувгаа сонгоно уу</option>
<option value="facebook">Facebook Messenger</option>
<option value="whatsapp">WhatsApp</option>
<option value="email">Email</option>
</select>

<div id="facebookField" style="display:none">
<input id="facebook" placeholder="Facebook нэр">
</div>

<div id="whatsappField" style="display:none">
<input id="whatsapp" placeholder="WhatsApp дугаар">
</div>

<div id="emailField" style="display:none">
<input id="email" placeholder="Email">
</div>

<textarea id="note" placeholder="Тайлбар"></textarea>

</div>

<div class="box">

<h3>Багц сонгох</h3>

<button onclick="pay(15000,'Global 7 day')">
7 хоног / 15,000₮
</button>

<button onclick="pay(29000,'Global 30 day')">
30 хоног / 29,000₮
</button>

<div id="status"></div>
<div id="qrbox"></div>

</div>

</div>


<script>

let invoiceId

function toggleDeliveryFields(){

const ch=document.getElementById("deliveryChannel").value

document.getElementById("facebookField").style.display="none"
document.getElementById("whatsappField").style.display="none"
document.getElementById("emailField").style.display="none"

if(ch==="facebook"){
document.getElementById("facebookField").style.display="block"
}

if(ch==="whatsapp"){
document.getElementById("whatsappField").style.display="block"
}

if(ch==="email"){
document.getElementById("emailField").style.display="block"
}

}


async function pay(amount,description){

const name=document.getElementById("customerName").value
const phone=document.getElementById("phone").value
const channel=document.getElementById("deliveryChannel").value

const facebook=document.getElementById("facebook")?.value || ""
const whatsapp=document.getElementById("whatsapp")?.value || ""
const email=document.getElementById("email")?.value || ""
const note=document.getElementById("note").value

if(!channel){
alert("QR код авах сувгаа сонгоно уу")
return
}

await fetch("/.netlify/functions/save-customer",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
customerName:name,
phone:phone,
deliveryChannel:channel,
facebook:facebook,
whatsapp:whatsapp,
email:email,
note:note,
product:description,
amount:amount
})
})

const res=await fetch("/.netlify/functions/qpay-create-invoice",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
amount:amount,
description:description,
orderId:"ORDER-"+Date.now()
})
})

const data=await res.json()

invoiceId=data.invoice_id

let qr=data.qr_image

if(!qr.startsWith("data")){
qr="data:image/png;base64,"+qr
}

document.getElementById("qrbox").innerHTML="<img src='"+qr+"'>"
document.getElementById("status").innerHTML="QPay апп-аараа QR уншуулж төлнө үү."

checkPayment()

}


function checkPayment(){

setInterval(async()=>{

const res=await fetch("/.netlify/functions/qpay-check",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
invoice_id:invoiceId
})
})

const data=await res.json()

if(data.paid){

document.getElementById("status").innerHTML="Төлбөр амжилттай!"

setTimeout(()=>{
window.location="https://m.me/esimmongolia"
},1500)

}

},5000)

}

</script>


</body>
</html>
