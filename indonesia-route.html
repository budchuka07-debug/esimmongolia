<!doctype html>
<html lang="mn">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Индонез — 6 хоногийн маршрут (Bali) | eSIM Mongolia</title>
  <link rel="stylesheet" href="/common.css">
  <link rel="stylesheet" href="/route-detail.css">
</head>
<body>
  <div class="wrap">
    <a href="/marshrut.html" class="btn">← Маршрут</a>
    <header class="route-hero">
      <h1>🇮🇩 Индонез (Bali) — 6 хоног</h1>
      <p class="lead">Seminyak → Ubud → Nusa Penida → Uluwatu</p>
      <a class="btn primary" href="/?plan=ID">📶 Indonesia eSIM</a>
    </header>
    <div class="video-section">
      <h3>🎬 Bali аялал</h3>
      <div class="video-embed"><iframe src="https://www.youtube.com/embed/6v2L2UGZJAM" title="Bali" allowfullscreen loading="lazy"></iframe></div>
    </div>
    <div class="poi-grid">
      <article class="poi">
        <img src="/images/routes/indonesia/bali.jpg" alt="Bali beach" loading="lazy">
        <div class="poi-body"><h3>Seminyak / Kuta пүү</h3><table class="poi-price"><tr><td>Үнэгүй</td></tr></table></div>
      </article>
      <article class="poi">
          <img src="/images/routes/indonesia/bali.jpg" alt="Ubud" loading="lazy">
        <div class="poi-body"><h3>Ubud Monkey Forest</h3><table class="poi-price"><tr><td>80,000 IDR (~32,000₮)</td></tr></table>
        <div class="poi-meta"><a href="https://www.google.com/maps/search/?api=1&query=Sacred+Monkey+Forest+Ubud" target="_blank" rel="noopener">📍 Maps</a></div></div>
      </article>
      <article class="poi">
        <img src="/images/routes/indonesia/uluwatu.jpg" alt="Uluwatu" loading="lazy">
        <div class="poi-body"><h3>Uluwatu Temple &amp; Kecak</h3><table class="poi-price"><tr><td>50,000 IDR + шоу</td></tr></table></div>
      </article>
    </div>
  </div>
