<!doctype html>
<html lang="mn">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Тайвань — 5 хоногийн маршрут | eSIM Mongolia</title>
  <link rel="stylesheet" href="/common.css">
  <link rel="stylesheet" href="/route-detail.css">
</head>
<body>
  <div class="wrap">
    <a href="/marshrut.html" class="btn">← Маршрут</a>
    <header class="route-hero">
      <h1>🇹🇼 Тайвань — 5 хоног</h1>
      <p class="lead">Taipei → Jiufen → Sun Moon Lake</p>
      <a class="btn primary" href="/?plan=TW">📶 Taiwan eSIM</a>
    </header>
    <div class="video-section">
      <h3>🎬 Taiwan аялал</h3>
      <div class="video-embed"><iframe src="https://www.youtube.com/embed/7gB50NZA8J8" title="Taiwan" allowfullscreen loading="lazy"></iframe></div>
    </div>
    <div class="poi-grid">
      <article class="poi">
        <img src="/images/routes/taiwan/taipei101.jpg" alt="Taipei 101" loading="lazy">
        <div class="poi-body"><h3>Taipei 101</h3><table class="poi-price"><tr><td>600 TWD (~660,000₮)</td></tr></table>
        <div class="poi-meta"><a href="https://www.google.com/maps/search/?api=1&query=Taipei+101" target="_blank" rel="noopener">📍 Maps</a></div></div>
      </article>
      <article class="poi">
          <img src="/images/routes/taiwan/taipei101.jpg" alt="Jiufen" loading="lazy">
        <div class="poi-body"><h3>Jiufen &amp; Shifen</h3><p class="poi-desc">Өдрийн аялал — шөнийн зах, усан уналга.</p></div>
      </article>
      <article class="poi">
          <img src="/images/routes/taiwan/taipei101.jpg" alt="Sun Moon Lake" loading="lazy">
        <div class="poi-body"><h3>Sun Moon Lake</h3><table class="poi-price"><tr><td>Boat + cable</td><td>~500 TWD</td></tr></table></div>
      </article>
    </div>
  </div>
</body>
</html>
