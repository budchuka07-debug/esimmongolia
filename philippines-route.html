<!doctype html>
<html lang="mn">
<head>

<body>
  <div class="wrap">
    <a href="/marshrut.html" class="btn">← Маршрут</a>

      <h1>🇵🇭 Филиппин — 6 хоног</h1>
      <p class="lead">Manila → Cebu → Palawan → Boracay</p>
      <a class="btn primary" href="/?plan=PH">📶 Philippines eSIM</a>

    <div class="video-section">
      <h3>🎬 Philippines аялал</h3>
      <div class="video-embed"><iframe src="https://www.youtube.com/embed/KnYI0Hf8nG0" title="Philippines" allowfullscreen loading="lazy"></iframe></div>

    <div class="poi-grid">
      <article class="poi">

      <article class="poi">

      <article class="poi">

      </article>
      <article class="poi">
        <img src="/images/routes/philippines/boracay.jpg" alt="Boracay" loading="lazy">
